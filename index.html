<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Company Registration / Service Request Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f9;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            margin: auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
        }

        fieldset {
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        legend {
            font-weight: bold;
        }

        label {
            display: block;
            margin-top: 10px;
        }

        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }

        .inline {
            width: auto;
            display: inline-block;
            margin-right: 10px;
        }

        .buttons {
            text-align: center;
        }

        button {
            padding: 10px 20px;
            margin: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .submit-btn {
            background: #28a745;
            color: white;
        }

        .reset-btn {
            background: #dc3545;
            color: white;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Company Registration / Service Request Form</h2>

    <form>
        <fieldset>
            <legend>Personal Information</legend>

            <label for="fullname">Full Name</label>
            <input type="text" id="fullname" name="fullname"
                   required minlength="3" maxlength="50"
                   placeholder="Enter your full name">

            <label for="email">Email Address</label>
            <input type="email" id="email" name="email"
                   required placeholder="example@email.com">

            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone"
                   required pattern="[0-9]{10}"
                   placeholder="Enter 10-digit phone number">
        </fieldset>

        <fieldset>
            <legend>Company Information</legend>

            <label for="company">Company Name</label>
            <input type="text" id="company" name="company"
                   required minlength="2">

            <label for="website">Company Website</label>
            <input type="url" id="website" name="website"
                   required placeholder="https://example.com">

            <label for="size">Company Size</label>
            <select id="size" name="size" required>
                <option value="">-- Select --</option>
                <option>1-10 employees</option>
                <option>11-50 employees</option>
                <option>51-200 employees</option>
                <option>200+ employees</option>
            </select>

            <label for="industry">Industry</label>
            <input type="text" id="industry" name="industry"
                   required>
        </fieldset>

        
        <fieldset>
            <legend>Service Request</legend>

            <label>Service Type</label>
            <input type="radio" name="service" value="web" required class="inline"> Web Development
            <input type="radio" name="service" value="design" class="inline"> Design
            <input type="radio" name="service" value="marketing" class="inline"> Marketing

            <label>Preferred Contact Method</label>
            <input type="checkbox" name="contact" value="email" class="inline"> Email
            <input type="checkbox" name="contact" value="phone" class="inline"> Phone
            <input type="checkbox" name="contact" value="whatsapp" class="inline"> WhatsApp

            <label for="date">Appointment Date</label>
            <input type="date" id="date" name="date" required>

            <label for="time">Appointment Time</label>
            <input type="time" id="time" name="time" required>

            <label for="budget">Budget Range (KES)</label>
            <input type="number" id="budget" name="budget"
                   min="1000" max="1000000" required>
        </fieldset>
        <fieldset>
            <legend>Message and Agreement</legend>

            <label for="message">Additional Information</label>
            <textarea id="message" name="message"
                      rows="4" minlength="10" maxlength="300"
                      placeholder="Enter your message here..."></textarea>

            <label>
                <input type="checkbox" required>
                I agree to the Terms and Conditions
            </label>
        </fieldset>

        <div class="buttons">
            <button type="submit" class="submit-btn">Submit</button>
            <button type="reset" class="reset-btn">Reset</button>
        </div>

    </form>
</div>

</body>
</html>
